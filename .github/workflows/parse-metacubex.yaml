name: Aggregate MetaCubeX Rules

on:
  workflow_run:
    workflows: ["Publish Rules to Release Branch"]
    types:
      - completed

jobs:

  aggregate-metacubex:
    name: Aggregate MetaCubeX Rules
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write

    steps:
      - name: Checkout release Branch
        uses: actions/checkout@v4
        with:
          ref: release
          fetch-depth: 0
      
      - name: Configure Git User
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Download MetaCubeX Rules
        run: |
          echo "Downloading geoip and geosite files from MetaCubeX/meta-rules-dat..."
          mkdir -p /tmp/metacubex-rules
          
          curl -sL "https://api.github.com/repos/MetaCubeX/meta-rules-dat/git/trees/meta?recursive=1" | \
            jq -r '.tree[] | select(.path | test("^geo/.*\\.(geoip|geosite)\\.mrs$")) | .path' | \
            while read file; do
              filename=$(basename "$file")
              echo "Downloading $filename..."
              curl -sL "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/$file" -o "/tmp/metacubex-rules/$filename"
            done
          
          echo "Downloaded files:" && ls -lh /tmp/metacubex-rules/ || echo "No files downloaded"
      
      - name: Merge Rules
        run: |
          echo "Merging rules from MetaCubeX..."
          merged_count=0
          skipped_count=0
          
          for file in /tmp/metacubex-rules/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              if [ -f "./$filename" ]; then
                echo "SKIP: $filename already exists in release branch"
                ((skipped_count++))
              else
                cp "$file" "./$filename"
                echo "ADD: $filename"
                ((merged_count++))
              fi
            fi
          done
          
          echo "Merged: $merged_count files, Skipped: $skipped_count files"
          rm -rf /tmp/metacubex-rules
      
      - name: Commit Changes
        id: commit_step
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit." && echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: merge MetaCubeX rules" && echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Push Changes
        if: steps.commit_step.outputs.has_changes == 'true'
        run: git push origin release